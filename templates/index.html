{% extends "layout.html" %}

{% block title %}
Portfolio
{% endblock %}

{% block main %}
    <h2>Your Portfolio</h2>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>Symbol</th>
                <th>Shares</th>
                <th>Price</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody>
            {% for stock in portfolio %}
            <tr>
                <td>{{ stock.symbol }}</td>
                <td>{{ stock.shares }}</td>
                <td>{{ stock.price }}</td>
                <td>{{ stock.total }}</td>
            </tr>
            {% endfor %}
        </tbody>

        <tfoot>
            <tr>
                <th colspan="3">Cash</th>
                <th>{{ cash }}</th>
            </tr>
            <tr>
                <th colspan="3">Total</th>
                <th>{{ total }}</th>
            </tr>
        </tfoot>
    </table>
{% endblock %}
