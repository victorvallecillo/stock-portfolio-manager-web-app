{% extends "layout.html" %}

{% block title %}
Add Cash
{% endblock %}

{% block main %}
<form action="/add_cash" method="post">
    <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="amount" placeholder="Amount" type="number" min="0.01" step="0.01">
    <button class="btn btn-success mt-3" type="submit">Add Cash</button>
</form>
{% endblock %}
