{% extends "layout.html" %}

{% block title %}
Buy
{% endblock %}

{% block main %}
<form action="/buy" method="post">
    <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="symbol" placeholder="Symbol" type="text">
    <input autocomplete="off" class="form-control mx-auto w-auto mt-3" name="shares" placeholder="Shares" type="number" min="1">
    <button class="btn btn-success mt-3" type="submit">Buy</button>
</form>
{% endblock %}
