{% extends "layout.html" %}

{% block title %}
Log In
{% endblock %}

{% block main %}
<form action="/login" method="post">
    <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="username" placeholder="Username" type="text">
    <input class="form-control mx-auto w-auto mt-3" name="password" placeholder="Password" type="password">
    <button class="btn btn-primary mt-3" type="submit">Log In</button>
</form>
{% endblock %}
